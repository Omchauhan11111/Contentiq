<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ContentIQ — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* ── Reset & Base ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  min-height:100vh;
  background:linear-gradient(145deg,#E8194B 0%,#C5103A 40%,#A00D30 70%,#D41545 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

/* ── Background Decorations ── */
.bg-shape{position:absolute;pointer-events:none;}
.shape-dots{position:absolute;top:10%;left:5%;width:180px;height:180px;opacity:.2;
  background-image:radial-gradient(circle,white 1.5px,transparent 1.5px);background-size:14px 14px;}
.shape-dots2{position:absolute;bottom:15%;right:5%;width:140px;height:140px;opacity:.15;
  background-image:radial-gradient(circle,white 1.5px,transparent 1.5px);background-size:12px 12px;}
.shape-circle{position:absolute;width:300px;height:300px;border:2px solid rgba(255,255,255,.1);
  border-radius:50%;top:-80px;right:-80px;}
.shape-circle2{position:absolute;width:200px;height:200px;border:2px solid rgba(255,255,255,.08);
  border-radius:50%;bottom:-60px;left:-60px;}
.shape-tri{position:absolute;bottom:0;left:0;width:0;height:0;
  border-left:250px solid rgba(255,255,255,.04);border-top:250px solid transparent;}

/* ── Login Card ── */
.card{
  background:white;border-radius:22px;padding:44px 42px;
  width:100%;max-width:440px;position:relative;z-index:10;
  box-shadow:0 24px 80px rgba(0,0,0,.28);
  animation:slideUp .4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── Logo ── */
.logo{display:flex;align-items:center;gap:10px;margin-bottom:30px;}
.logo-icon{width:40px;height:40px;background:#E8194B;border-radius:11px;
  display:flex;align-items:center;justify-content:center;color:white;font-weight:800;font-size:18px;flex-shrink:0;}
.logo-text{font-size:22px;font-weight:800;color:#1A1D2E;}
.logo-text em{color:#E8194B;font-style:normal;}

h1{font-size:26px;font-weight:800;color:#1A1D2E;margin-bottom:6px;}
.subtitle{font-size:14px;color:#7B8297;margin-bottom:28px;}

/* ── Form Elements ── */
.form-group{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:600;color:#1A1D2E;margin-bottom:6px;}
.input-wrap{position:relative;}
input[type="email"],input[type="password"],input[type="text"]{
  width:100%;padding:12px 14px;border:1.5px solid #E8EAF0;
  border-radius:10px;font-size:14px;font-family:inherit;
  color:#1A1D2E;background:#FAFBFC;transition:all .2s;outline:none;
}
input:focus{border-color:#E8194B;background:white;box-shadow:0 0 0 3px rgba(232,25,75,.08);}
input.error{border-color:#EF4444;}
.pw-toggle{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  cursor:pointer;color:#7B8297;background:none;border:none;padding:0;display:flex;}
.pw-toggle:hover{color:#1A1D2E;}

/* ── Error / Alert ── */
.alert{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:16px;display:none;}
.alert.show{display:block;}
.alert-error{background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;}
.alert-success{background:#F0FDF4;color:#16A34A;border:1px solid #BBF7D0;}

/* ── Submit Button ── */
.btn-submit{
  width:100%;padding:14px;background:#E8194B;border:none;
  border-radius:10px;color:white;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  margin-top:6px;
}
.btn-submit:hover:not(:disabled){background:#C5103A;transform:translateY(-1px);box-shadow:0 6px 20px rgba(232,25,75,.3);}
.btn-submit:disabled{opacity:.7;cursor:not-allowed;transform:none;}

/* ── Spinner ── */
.spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.3);
  border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Footer ── */
.card-footer{text-align:center;margin-top:22px;font-size:13.5px;color:#7B8297;}
.card-footer a{color:#E8194B;font-weight:600;text-decoration:none;}
.card-footer a:hover{text-decoration:underline;}

.divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#B0B6CB;font-size:12px;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#E8EAF0;}

/* ── Remember me + Forgot ── */
.row-between{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.checkbox-label{display:flex;align-items:center;gap:8px;font-size:13px;color:#7B8297;cursor:pointer;}
.checkbox-label input[type="checkbox"]{accent-color:#E8194B;width:15px;height:15px;}
.forgot-link{font-size:13px;color:#E8194B;font-weight:600;text-decoration:none;}
.forgot-link:hover{text-decoration:underline;}

/* ── Responsive ── */
@media(max-width:480px){
  .card{padding:30px 22px;border-radius:16px;margin:16px;}
  h1{font-size:22px;}
}
</style>
</head>
<body>

<!-- Background decorations -->
<div class="shape-dots"></div>
<div class="shape-dots2"></div>
<div class="shape-circle"></div>
<div class="shape-circle2"></div>
<div class="shape-tri"></div>

<div class="card">
  <!-- Logo -->
  <div class="logo">
    <div class="logo-icon">C</div>
    <div class="logo-text">Content<em>IQ</em></div>
  </div>

  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your ContentIQ dashboard</p>

  <!-- Error / Success alerts -->
  <div class="alert alert-error" id="alertError"></div>
  <div class="alert alert-success" id="alertSuccess"></div>

  <!-- Login Form -->
  <div class="form-group">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@company.com" autocomplete="email"/>
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <div class="input-wrap">
      <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password"/>
      <button class="pw-toggle" type="button" onclick="togglePassword()" title="Show/hide password">
        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
          <circle cx="12" cy="12" r="3"/>
        </svg>
      </button>
    </div>
  </div>

  <div class="row-between">
    <label class="checkbox-label">
      <input type="checkbox" id="rememberMe"/> Remember me
    </label>
    <a href="#" class="forgot-link">Forgot password?</a>
  </div>

  <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
    <div class="spinner" id="spinner"></div>
    <span id="btnText">Sign in</span>
  </button>

  <div class="card-footer">
    Don't have an account? <a href="register.html">Create account</a>
  </div>
</div>

<script>
// ── Config — change API_URL to your backend URL ──────────────────────────
const API_URL = window.location.hostname === 'localhost'
  ? 'http://localhost:3000'
  : 'https://your-backend-url.com';   // <-- update this when deploying

// ── Toggle password visibility ────────────────────────────────────────────
function togglePassword() {
  const input = document.getElementById('password');
  const icon = document.getElementById('eyeIcon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.innerHTML = `<path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`;
  } else {
    input.type = 'password';
    icon.innerHTML = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  }
}

// ── Show / hide alert messages ────────────────────────────────────────────
function showError(msg) {
  const el = document.getElementById('alertError');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('alertSuccess').classList.remove('show');
}
function showSuccess(msg) {
  const el = document.getElementById('alertSuccess');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('alertError').classList.remove('show');
}
function hideAlerts() {
  document.getElementById('alertError').classList.remove('show');
  document.getElementById('alertSuccess').classList.remove('show');
}

// ── Set loading state on button ───────────────────────────────────────────
function setLoading(loading) {
  const btn = document.getElementById('loginBtn');
  const spinner = document.getElementById('spinner');
  const text = document.getElementById('btnText');
  btn.disabled = loading;
  spinner.style.display = loading ? 'block' : 'none';
  text.textContent = loading ? 'Signing in...' : 'Sign in';
}

// ── Main login handler ────────────────────────────────────────────────────
async function handleLogin() {
  hideAlerts();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const remember = document.getElementById('rememberMe').checked;

  // Basic validation
  if (!email || !password) {
    showError('Please enter your email and password.');
    return;
  }

  setLoading(true);

  try {
    const response = await fetch(`${API_URL}/api/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });

    const data = await response.json();

    if (!response.ok) {
      showError(data.error || 'Login failed. Please try again.');
      return;
    }

    // Save token to storage (localStorage if remember me, sessionStorage otherwise)
    const storage = remember ? localStorage : sessionStorage;
    storage.setItem('contentiq_token', data.token);
    storage.setItem('contentiq_user', JSON.stringify(data.user));

    showSuccess('Login successful! Redirecting...');
    setTimeout(() => { window.location.href = 'dashboard.html'; }, 700);

  } catch (err) {
    showError('Cannot reach server. Please check your connection.');
  } finally {
    setLoading(false);
  }
}

// ── Allow Enter key to submit ─────────────────────────────────────────────
document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleLogin();
});

// ── Redirect if already logged in ────────────────────────────────────────
const existingToken = localStorage.getItem('contentiq_token') || sessionStorage.getItem('contentiq_token');
if (existingToken) {
  window.location.href = 'dashboard.html';
}
</script>
</body>
</html>
